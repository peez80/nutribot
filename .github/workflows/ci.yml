name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Extract short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: peez/rememberbot
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.sha_short }}-${{ steps.timestamp.outputs.timestamp }}

      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Tests in Docker Container
        run: |
          docker run --rm -v ${{ github.workspace }}/tests:/app/tests peez/rememberbot:latest pytest /app/tests

      - name: Push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output Image Tags to Job Summary
        run: |
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          TAGS="${{ steps.meta.outputs.tags }}"
          
          if [ -n "$USERNAME" ]; then
            SPLIT_USER="${USERNAME:0:1}<span>${USERNAME:1}</span>"
            MODIFIED_TAGS="${TAGS//$USERNAME/$SPLIT_USER}"
          else
            MODIFIED_TAGS="$TAGS"
          fi
          
          echo "### 🐳 Generated Docker Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "<ul>" >> $GITHUB_STEP_SUMMARY
          for tag in $MODIFIED_TAGS; do
            echo "<li><code>$tag</code></li>" >> $GITHUB_STEP_SUMMARY
          done
          echo "</ul>" >> $GITHUB_STEP_SUMMARY
