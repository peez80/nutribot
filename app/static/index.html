<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriBot - KI Ernährungstagebuch</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=5">
    <!-- Phosphor Icons for premium aesthetic -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Markdown Parsing and Sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <button id="new-chat-btn" class="icon-button primary" title="Neuer Chat">
                    <i class="ph-bold ph-plus"></i>
                </button>
                <button id="close-sidebar-btn" class="icon-button mobile-only" title="Schließen">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <div class="session-list" id="session-list">
                <!-- Session items will be injected here -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="app-container">
            <header class="app-header">
                <button id="menu-btn" class="icon-button mobile-only" title="Menü">
                    <i class="ph-bold ph-list"></i>
                </button>
                <div class="header-title">
                    <i class="ph-fill ph-leaf"></i>
                    <h1>NutriBot</h1>
                </div>
                <div id="user-badge" class="user-badge" style="display: none;" title="Benutzer"></div>
                <button id="system-prompt-btn" class="icon-button" title="Chat-Einstellungen" disabled>
                    <i class="ph-bold ph-faders"></i>
                </button>
                <button id="logout-btn" class="icon-button" title="Abmelden" style="margin-left: 0.5rem;">
                    <i class="ph-bold ph-sign-out"></i>
                </button>
            </header>

            <main class="chat-container" id="chat-container">
                <!-- Chat messages will be injected here -->
            </main>

            <footer class="input-area">
                <div class="context-warning" id="context-warning" style="display: none;">
                    <i class="ph-fill ph-warning-circle"></i> Hinweis: Ältere Nachrichten wurden ausgeblendet, um Platz zu sparen.
                </div>
                <div class="image-preview-container" id="image-preview-container" style="display: none;">
                    <!-- Previews will be injected here via JS -->
                </div>
                
                <form id="chat-form" class="input-form">
                    <label for="camera-upload" class="icon-button" title="Foto aufnehmen">
                        <i class="ph-bold ph-camera"></i>
                    </label>
                    <input type="file" id="camera-upload" accept="image/*" capture="environment" multiple style="display: none;" />
                    
                    <label for="image-upload" class="icon-button" title="Bild aus Galerie wählen">
                        <i class="ph-bold ph-image"></i>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" multiple style="display: none;" />
                    
                    <textarea id="message-input" rows="1" placeholder="Nachricht eingeben..."></textarea>
                    
                    <button type="submit" class="icon-button primary" id="send-btn" title="Senden">
                        <i class="ph-bold ph-paper-plane-right"></i>
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-content">
            <h2><i class="ph-bold ph-lock-key"></i> Login</h2>
            <p>Bitte melde dich an, um dein Tagebuch zu nutzen.</p>
            
            <form id="auth-form" class="auth-form" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" id="login-username" placeholder="Benutzername" required autocomplete="username" style="padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                <input type="password" id="login-password" placeholder="Passwort" required autocomplete="current-password" style="padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px;">
                <button type="submit" class="primary-btn" id="verify-btn">Anmelden</button>
            </form>
        </div>
    </div>

    <!-- System Prompt Modal -->
    <div id="system-prompt-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2><i class="ph-bold ph-faders"></i> Chat-Einstellungen</h2>
            <p>Passe den Titel und die System-Anweisungen für diesen Chat an.</p>
            
            <form id="system-prompt-form" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="chat-title-input" style="font-size: 0.9rem; font-weight: 500;">Chat-Titel</label>
                    <input type="text" id="chat-title-input" placeholder="Titel eingeben..." class="text-input" style="padding: 0.5rem; border-radius: 0.25rem; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-main); font-family: inherit;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="system-prompt-input" style="font-size: 0.9rem; font-weight: 500;">System-Prompt</label>
                    <textarea id="system-prompt-input" placeholder="Du bist ein hilfreicher Ernährungsberater..." class="prompt-textarea"></textarea>
                </div>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button type="button" class="secondary-btn" id="close-prompt-btn">Abbrechen</button>
                    <button type="submit" class="primary-btn" id="save-prompt-btn">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js?v=5"></script>
</body>
</html>
