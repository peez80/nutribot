services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./_rememberbot_data:/app/data
      - ~/.gemini/antigravity-cli:/root/.gemini/antigravity-cli
    environment:
      - DATA_DIR=/app/data
      - LOG_LEVEL=DEBUG
volumes:
  rememberbot_data:
